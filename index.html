<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane Bell — Client Pitches</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0C0E;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.logo{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:48px}
h1{font-family:'Outfit',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-.02em;text-align:center;margin-bottom:12px}
.sub{color:rgba(255,255,255,0.4);font-size:15px;text-align:center;margin-bottom:56px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;width:100%;max-width:900px}
.card{background:#141416;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px;transition:border-color .2s,transform .2s;text-decoration:none;display:block}
.card:hover{border-color:rgba(255,255,255,0.18);transform:translateY(-2px)}
.card-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:10px}
.card-name{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
.card-desc{font-size:14px;color:rgba(255,255,255,0.45);line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 8px rgba(74,222,128,0.5);margin-right:8px}
footer{margin-top:64px;font-size:13px;color:rgba(255,255,255,0.2)}
footer a{color:rgba(255,255,255,0.4);text-decoration:none}
footer a:hover{color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<div class="logo">Shane Bell / Client Pitches</div>
<h1>Free Redesign Concepts</h1>
<p class="sub">Custom website redesigns built for local businesses — no strings attached.</p>
<div class="grid">
  <a href="/murrays/" class="card">
    <div class="card-label"><span class="dot"></span>Live</div>
    <div class="card-name">Murray's Electrical Ltd.</div>
    <div class="card-desc">Electrician in Dunstable, Bedfordshire — modern premium redesign with dark/light mode.</div>
  </a>
</div>
<footer>Built by <a href="https://shanebell.dev">Shane Bell</a> &nbsp;·&nbsp; <a href="https://shanebell.dev">shanebell.dev</a></footer>
</body>
</html>
